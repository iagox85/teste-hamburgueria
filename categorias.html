<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css?v=20260703modals1">
  <link rel="stylesheet" href="assets/css/mobile.css?v=20260703modals1">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content page-stack">

    <header id="topbar" class="topbar"></header>

    <section class="page-hero page-hero-standard">
      <div class="page-hero-main">
        <div class="page-hero-title-row">
          <h2>📂 Categorias</h2>
          <div class="page-hero-actions">
            <button id="btnNovaCategoria" type="button" class="btn-admin-secondary">+ Nova categoria</button>
          </div>
        </div>
        <p>Organize seu cardápio em categorias.</p>
      </div>
    </section>

    <section class="admin-list-panel">
      <div class="admin-list-head">
        <div>
          <h2>Lista de categorias</h2>
          <p>As categorias aparecem no cardápio público para facilitar a navegação dos clientes.</p>
        </div>
      </div>

      <form id="formCategoria" class="admin-inline-form admin-form-modal oculto">
        <div class="admin-form-modal-header">
          <div>
            <span>Categoria</span>
            <h2>Nova categoria</h2>
            <p>Crie uma categoria para organizar os produtos no cardápio.</p>
          </div>
          <button type="button" class="admin-form-modal-close" aria-label="Fechar" onclick="this.closest('form').classList.add('oculto')">×</button>
        </div>

        <div class="admin-form-modal-body">
          <label class="admin-form-field">
            <span>Nome da categoria</span>
            <input type="text" id="categoriaNome" placeholder="Ex.: Hambúrgueres" required>
          </label>

          <label class="admin-form-field">
            <span>Descrição</span>
            <textarea id="categoriaDescricao" placeholder="Ex.: Produtos principais da loja"></textarea>
          </label>
        </div>

        <div class="admin-form-modal-footer">
          <button type="button" class="admin-form-modal-cancel" onclick="this.closest('form').classList.add('oculto')">Cancelar</button>
          <button type="submit" class="admin-form-modal-save">Salvar categoria</button>
        </div>
      </form>

      <div id="listaCategorias" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/deliveryos.js?v=20260701core1"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js?v=20260702mobile2"></script>
<script src="assets/js/topbar.js?v=20260702mobile2"></script>
<script>
  carregarSidebar("categorias");
  carregarTopbar("Categorias", "Organize os produtos do cardápio.");
</script>
<script src="assets/js/categorias-admin.js"></script>

</body>
</html>
