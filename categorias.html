<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categorias - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css?v=20260702tablesv1">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content page-stack">

    <header id="topbar" class="topbar"></header>

    <section class="page-hero page-hero-standard">
      <div class="page-hero-main">
        <div class="page-hero-title-row">
          <h2>📂 Categorias</h2>
          <div class="page-hero-actions">
            <button id="btnNovaCategoria" type="button" class="btn-admin-secondary">+ Nova categoria</button>
          </div>
        </div>
        <p>Organize seu cardápio em categorias.</p>
      </div>
    </section>

    <section class="admin-list-panel">
      <div class="admin-list-head">
        <div>
          <h2>Lista de categorias</h2>
          <p>As categorias aparecem no cardápio público para facilitar a navegação dos clientes.</p>
        </div>
      </div>

      <form id="formCategoria" class="admin-inline-form oculto">
        <input type="text" id="categoriaNome" placeholder="Nome da categoria" required>
        <textarea id="categoriaDescricao" placeholder="Descrição"></textarea>
        <button type="submit">Salvar categoria</button>
      </form>

      <div id="listaCategorias" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/deliveryos.js?v=20260701core1"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>
<script>
  carregarSidebar("categorias");
  carregarTopbar("Categorias", "Organize os produtos do cardápio.");
</script>
<script src="assets/js/categorias-admin.js"></script>

</body>
</html>
