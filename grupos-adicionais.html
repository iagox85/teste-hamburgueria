<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupos de Adicionais - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css?v=20260703modals1">
  <link rel="stylesheet" href="assets/css/mobile.css?v=20260703modals1">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content page-stack">

    <header id="topbar" class="topbar"></header>

    <section class="page-hero page-hero-standard">
      <div class="page-hero-main">
        <div class="page-hero-title-row">
          <h2>🧩 Grupos de adicionais</h2>
          <div class="page-hero-actions">
            <button id="btnNovoGrupo" type="button" class="btn-admin-secondary">+ Novo grupo</button>
          </div>
        </div>
        <p>Crie grupos para personalizar os produtos.</p>
      </div>
    </section>

    <section class="admin-list-panel">
      <div class="admin-list-head">
        <div>
          <h2>Lista de grupos</h2>
          <p>Configure como os adicionais serão exibidos dentro do produto.</p>
        </div>
      </div>

      <form id="formGrupo" class="admin-inline-form admin-form-modal oculto">
        <div class="admin-form-modal-header">
          <div>
            <span>Grupo de adicionais</span>
            <h2>Novo grupo</h2>
            <p>Defina regras de escolha para adicionais como bordas, molhos e extras.</p>
          </div>
          <button type="button" class="admin-form-modal-close" aria-label="Fechar" onclick="this.closest('form').classList.add('oculto')">×</button>
        </div>

        <div class="admin-form-modal-body">
          <label class="admin-form-field">
            <span>Nome do grupo</span>
            <input type="text" id="grupoNome" placeholder="Ex.: Molhos" required>
          </label>

          <label class="admin-form-field">
            <span>Descrição</span>
            <textarea id="grupoDescricao" placeholder="Ex.: Escolha até dois molhos"></textarea>
          </label>

          <div class="admin-form-grid-2">
            <label class="admin-form-field">
              <span>Mínimo de escolhas</span>
              <input type="number" id="grupoMinimo" placeholder="0" min="0" value="0">
            </label>

            <label class="admin-form-field">
              <span>Máximo de escolhas</span>
              <input type="number" id="grupoMaximo" placeholder="0" min="0" value="0">
            </label>
          </div>
        </div>

        <div class="admin-form-modal-footer">
          <button type="button" class="admin-form-modal-cancel" onclick="this.closest('form').classList.add('oculto')">Cancelar</button>
          <button type="submit" class="admin-form-modal-save">Salvar grupo</button>
        </div>
      </form>

      <div id="listaGrupos" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/deliveryos.js?v=20260701core1"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js?v=20260702mobile2"></script>
<script src="assets/js/topbar.js?v=20260702mobile2"></script>
<script>
  carregarSidebar("grupos");
  carregarTopbar("Grupos", "Crie grupos como Extras, Molhos ou Bordas.");
</script>
<script src="assets/js/grupos-adicionais-admin.js"></script>

</body>
</html>
