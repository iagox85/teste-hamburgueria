<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grupos de Adicionais - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css?v=20260701v10">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content page-stack">

    <header id="topbar" class="topbar"></header>

    <section class="page-hero">
      <div>
        <span class="page-hero-kicker">📋 Adicionais</span>
        <h2>Grupos de adicionais</h2>
        <p>Crie grupos como extras, molhos, bordas e complementos com limite mínimo e máximo de escolhas.</p>
      </div>

      <div class="page-hero-actions">
        <button id="btnNovoGrupo" type="button" class="btn-admin-secondary">+ Novo grupo</button>
      </div>
    </section>

    <section class="admin-list-panel">
      <div class="admin-list-head">
        <div>
          <h2>Lista de grupos</h2>
          <p>Configure como os adicionais serão exibidos dentro do produto.</p>
        </div>
      </div>

      <form id="formGrupo" class="admin-inline-form oculto">
        <input type="text" id="grupoNome" placeholder="Nome do grupo" required>
        <textarea id="grupoDescricao" placeholder="Descrição"></textarea>
        <input type="number" id="grupoMinimo" placeholder="Mínimo de escolhas" min="0" value="0">
        <input type="number" id="grupoMaximo" placeholder="Máximo de escolhas" min="0" value="0">
        <button type="submit">Salvar grupo</button>
      </form>

      <div id="listaGrupos" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/deliveryos.js?v=20260701core1"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>
<script>
  carregarSidebar("grupos");
  carregarTopbar("Grupos", "Crie grupos como Extras, Molhos ou Bordas.");
</script>
<script src="assets/js/grupos-adicionais-admin.js"></script>

</body>
</html>
