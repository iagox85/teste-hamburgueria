<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionais - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css?v=20260701notifzero">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content page-stack">

    <header id="topbar" class="topbar"></header>

    <section class="page-hero">
      <div>
        <span class="page-hero-kicker">🧀 Complementos</span>
        <h2>Adicionais da loja</h2>
        <p>Cadastre bacon, cheddar, molhos, bordas, bebidas extras e tudo que pode aumentar o ticket médio.</p>
      </div>

      <div class="page-hero-actions">
        <button id="btnNovoAdicional" type="button" class="btn-admin-secondary">+ Novo adicional</button>
      </div>
    </section>

    <section class="admin-list-panel">
      <div class="admin-list-head">
        <div>
          <h2>Lista de adicionais</h2>
          <p>Vincule cada adicional a um grupo para aparecer corretamente no produto.</p>
        </div>
      </div>

      <form id="formAdicional" class="admin-inline-form oculto">
        <input type="text" id="adicionalNome" placeholder="Nome do adicional" required>
        <textarea id="adicionalDescricao" placeholder="Descrição"></textarea>

        <select id="adicionalGrupo">
          <option value="">Selecione um grupo</option>
        </select>

        <input type="number" id="adicionalPreco" placeholder="Preço" step="0.01" required>
        <button type="submit">Salvar adicional</button>
      </form>

      <div id="listaAdicionais" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>
<script src="assets/js/deliveryos-ui.js"></script>
<script src="assets/js/deliveryos-notificacoes.js?v=20260701notifzero"></script>
<script>
  carregarSidebar("adicionais");
  carregarTopbar("Adicionais", "Cadastre adicionais e vincule cada um a um grupo.");
</script>
<script src="assets/js/adicionais-admin.js"></script>

</body>
</html>
