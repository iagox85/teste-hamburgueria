<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Adicionais - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css?v=20260703modals1">
  <link rel="stylesheet" href="assets/css/mobile.css?v=20260703modals1">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content page-stack">

    <header id="topbar" class="topbar"></header>

    <section class="page-hero page-hero-standard">
      <div class="page-hero-main">
        <div class="page-hero-title-row">
          <h2>🧀 Adicionais</h2>
          <div class="page-hero-actions">
            <button id="btnNovoAdicional" type="button" class="btn-admin-secondary">+ Novo adicional</button>
          </div>
        </div>
        <p>Cadastre ingredientes, bordas, molhos e complementos.</p>
      </div>
    </section>

    <section class="admin-list-panel">
      <div class="admin-list-head">
        <div>
          <h2>Lista de adicionais</h2>
          <p>Vincule cada adicional a um grupo para aparecer corretamente no produto.</p>
        </div>
      </div>

      <form id="formAdicional" class="admin-inline-form admin-form-modal oculto">
        <div class="admin-form-modal-header">
          <div>
            <span>Adicional</span>
            <h2>Novo adicional</h2>
            <p>Cadastre ingredientes, bordas, molhos e complementos do cardápio.</p>
          </div>
          <button type="button" class="admin-form-modal-close" aria-label="Fechar" onclick="this.closest('form').classList.add('oculto')">×</button>
        </div>

        <div class="admin-form-modal-body">
          <label class="admin-form-field">
            <span>Nome do adicional</span>
            <input type="text" id="adicionalNome" placeholder="Ex.: Bacon extra" required>
          </label>

          <label class="admin-form-field">
            <span>Descrição</span>
            <textarea id="adicionalDescricao" placeholder="Ex.: Porção extra adicionada ao produto"></textarea>
          </label>

          <div class="admin-form-grid-2">
            <label class="admin-form-field">
              <span>Grupo</span>
              <select id="adicionalGrupo">
                <option value="">Selecione um grupo</option>
              </select>
            </label>

            <label class="admin-form-field">
              <span>Preço</span>
              <input type="number" id="adicionalPreco" placeholder="0,00" step="0.01" required>
            </label>
          </div>
        </div>

        <div class="admin-form-modal-footer">
          <button type="button" class="admin-form-modal-cancel" onclick="this.closest('form').classList.add('oculto')">Cancelar</button>
          <button type="submit" class="admin-form-modal-save">Salvar adicional</button>
        </div>
      </form>

      <div id="listaAdicionais" class="lista-produtos"></div>
    </section>

  </main>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/deliveryos.js?v=20260701core1"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js?v=20260702mobile2"></script>
<script src="assets/js/topbar.js?v=20260702mobile2"></script>
<script>
  carregarSidebar("adicionais");
  carregarTopbar("Adicionais", "Cadastre adicionais e vincule cada um a um grupo.");
</script>
<script src="assets/js/adicionais-admin.js"></script>

</body>
</html>
