<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relatórios - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-layout">
  <aside id="sidebar" class="sidebar"></aside>

  <main class="content">
    <header id="topbar" class="topbar"></header>

    <section class="cards">
      <div class="card">
        <span>Vendas hoje</span>
        <strong>R$ 0,00</strong>
      </div>

      <div class="card">
        <span>Pedidos hoje</span>
        <strong>0</strong>
      </div>

      <div class="card">
        <span>Faturamento mensal</span>
        <strong>R$ 0,00</strong>
      </div>

      <div class="card">
        <span>Ticket médio</span>
        <strong>R$ 0,00</strong>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Relatórios</h2>
          <p class="panel-subtitle">Resumo de vendas, pedidos e desempenho da loja.</p>
        </div>
      </div>

      <p>Os relatórios serão gerados quando os pedidos começarem a entrar.</p>
    </section>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>

<script>
  carregarSidebar("relatorios");
  carregarTopbar("Relatórios", "Acompanhe o desempenho da sua loja.");
</script>

</body>
</html>
