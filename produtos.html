<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Produtos - DeliveryOS</title>
  <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>

<div class="admin-layout">

  <aside id="sidebar" class="sidebar"></aside>

  <main class="content">

    <header id="topbar" class="topbar"></header>

    <section class="panel">
      <div class="panel-header">
        <div>
          <h2>Lista de produtos</h2>
          <p class="panel-subtitle">Gerencie todos os produtos do seu cardápio.</p>
        </div>

        <button id="btnNovoProduto">+ Novo Produto</button>
      </div>

      <div class="toolbar">
        <input type="text" id="buscarProduto" placeholder="Buscar produto...">
      </div>

      <div id="listaProdutos" class="lista-produtos"></div>
    </section>

  </main>

</div>

<div id="modalProduto" class="modal oculto">
  <div class="modal-content">
    <div class="modal-header">
      <h2>Novo Produto</h2>
      <button id="fecharModalProduto" type="button">×</button>
    </div>

    <form id="formProduto" class="form-modal">
      <input type="text" id="produtoNome" placeholder="Nome do produto" required>
      <textarea id="produtoDescricao" placeholder="Descrição do produto"></textarea>

      <select id="produtoCategoria">
        <option value="">Selecione uma categoria</option>
      </select>

      <input type="number" id="produtoPreco" placeholder="Preço" step="0.01" required>

      <div class="campo-imagem-produto">
        <label for="produtoImagem">Imagem do produto</label>

        <div class="preview-produto-imagem" id="produtoImagemPreview">
          <span>Sem imagem</span>
        </div>

        <input type="file" id="produtoImagem" accept="image/*">
        <input type="hidden" id="produtoImagemUrl">

        <div class="imagem-produto-acoes">
          <button type="button" id="btnRemoverImagem" class="btn-secundario">
            Remover imagem
          </button>
        </div>

        <small class="ajuda-campo">
          Recomendado: imagem quadrada ou horizontal, até 2MB.
        </small>
      </div>

      <div class="campo-grupos">
        <label>Grupos de adicionais</label>
        <div id="listaGruposProduto" class="lista-checkbox"></div>
      </div>

      <button type="submit">Salvar Produto</button>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="assets/js/config.js"></script>
<script src="assets/js/supabase.js"></script>
<script src="assets/js/admin.js"></script>
<script src="assets/js/sidebar.js"></script>
<script src="assets/js/topbar.js"></script>

<script>
  carregarSidebar("produtos");
  carregarTopbar("Produtos", "Cadastre, edite e organize os produtos da sua loja.");
</script>

<script src="assets/js/produtos-admin.js"></script>

</body>
</html>
